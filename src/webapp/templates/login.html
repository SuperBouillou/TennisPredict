<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddshift — Connexion</title>
  <link rel="icon" type="image/png" href="/static/img/oddshift-favicon.png">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      margin: 0;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }
    .login-logo span { color: var(--green); }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--green); }
    .flash-msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .flash-msg.success {
      background: rgba(16,185,129,0.1);
      color: var(--green);
      border-color: rgba(16,185,129,0.2);
    }
    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo" style="display:flex;align-items:center;justify-content:center;gap:8px;font-size:22px;font-weight:700;letter-spacing:-0.02em">
      <span style="width:11px;height:11px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);flex-shrink:0;display:inline-block"></span>
      odd<span>shift</span>
    </div>

    {% if flash %}
      <div class="flash-msg {% if 'reussi' in flash or 'Deconnexion' in flash %}success{% endif %}">
        {{ flash }}
      </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Se connecter</button>
    </form>
  </div>
</body>
</html>
