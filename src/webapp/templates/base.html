<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TennisPredict{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="sidebar">
    <div class="logo">🎾</div>
    <a href="/today"       class="nav-item {% if active=='today' %}active{% endif %}" title="Matchs du jour">📅</a>
    <a href="/predictions" class="nav-item {% if active=='predictions' %}active{% endif %}" title="Prédictions">⚡</a>
    <a href="/history"     class="nav-item {% if active=='history' %}active{% endif %}" title="Historique">📋</a>
    <a href="/joueurs"     class="nav-item {% if active=='joueurs' %}active{% endif %}" title="Joueurs">👤</a>
    <a href="/stats"       class="nav-item {% if active=='stats' %}active{% endif %}" title="Statistiques">📊</a>
  </nav>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">{% block page_title %}TennisPredict{% endblock %}</div>
        <div class="topbar-meta" style="display:flex;align-items:center;gap:8px">
          <span>{% block page_meta %}{% endblock %}</span>
          <span id="sync-status"
                hx-get="/sync/status"
                hx-trigger="load, every 10s"
                hx-swap="outerHTML"></span>
        </div>
      </div>
      <div>{% block topbar_right %}{% endblock %}</div>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
  </div>
  <!-- Modal overlay -->
  <div id="modal-overlay"
       style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;overflow-y:auto;padding:16px"
       onclick="if(event.target===this)closeModal()">
    <div id="modal-content" style="margin:40px auto;max-width:680px"></div>
  </div>
  <script>
  function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
  function openModal(card) {
    var p = new URLSearchParams({
      tour: card.dataset.tour || 'atp',
      p1_name: card.dataset.p1 || '',
      p2_name: card.dataset.p2 || '',
      tournament: card.dataset.tournament || '',
      surface: card.dataset.surface || 'Hard',
      round: card.dataset.round || '',
      best_of: card.dataset.bestOf || '3',
    });
    if (card.dataset.oddP1) p.set('odd_p1', card.dataset.oddP1);
    if (card.dataset.oddP2) p.set('odd_p2', card.dataset.oddP2);
    var content = document.getElementById('modal-content');
    content.textContent = 'Chargement\u2026';
    document.getElementById('modal-overlay').style.display = 'block';
    htmx.ajax('GET', '/today/match-detail?' + p.toString(), '#modal-content');
  }
  </script>
</body>
</html>
