{% extends "base.html" %}
{% block title %}Prédictions — TennisPredict{% endblock %}
{% block page_title %}Prédictions{% endblock %}
{% block page_meta %}Analyse manuelle d'un match{% endblock %}

{% block topbar_right %}
<div class="toggle-group">
  <a href="/predictions?tour=atp">
    <button class="toggle-btn {% if tour=='atp' %}active{% endif %}">ATP</button>
  </a>
  <a href="/predictions?tour=wta">
    <button class="toggle-btn {% if tour=='wta' %}active{% endif %}">WTA</button>
  </a>
</div>
{% endblock %}

{% block content %}
<form hx-post="/predictions/run"
      hx-target="#result-card"
      hx-swap="innerHTML">
  <input type="hidden" name="tour" value="{{ tour }}">

  <div class="grid-2" style="margin-bottom:10px">
    <!-- Joueur 1 -->
    <div class="form-group autocomplete-wrapper">
      <label class="form-label">Joueur 1</label>
      <input class="form-input" id="p1_input" name="p1_name"
             placeholder="Ex: Jannik Sinner"
             value="{{ prefill.p1_name if prefill else '' }}"
             autocomplete="off"
             hx-get="/predictions/autocomplete"
             hx-trigger="keyup changed delay:200ms"
             hx-target="#p1-list"
             hx-vals='{"tour": "{{ tour }}", "field": "p1"}'
             oninput="this.setAttribute('name','q')"
             onfocus="this.setAttribute('name','q')"
             onblur="setTimeout(()=>{ var el=document.getElementById('p1-list'); if(el) el.textContent=''; },200)">
      <div id="p1-list" class="autocomplete-list"></div>
    </div>

    <!-- Joueur 2 -->
    <div class="form-group autocomplete-wrapper">
      <label class="form-label">Joueur 2</label>
      <input class="form-input" id="p2_input" name="p2_name"
             placeholder="Ex: Carlos Alcaraz"
             value="{{ prefill.p2_name if prefill else '' }}"
             autocomplete="off"
             hx-get="/predictions/autocomplete"
             hx-trigger="keyup changed delay:200ms"
             hx-target="#p2-list"
             hx-vals='{"tour": "{{ tour }}", "field": "p2"}'
             oninput="this.setAttribute('name','q')"
             onfocus="this.setAttribute('name','q')"
             onblur="setTimeout(()=>{ var el=document.getElementById('p2-list'); if(el) el.textContent=''; },200)">
      <div id="p2-list" class="autocomplete-list"></div>
    </div>
  </div>

  <div class="grid-3" style="margin-bottom:10px">
    <div class="form-group">
      <label class="form-label">Tournoi</label>
      <input class="form-input" name="tournament"
             placeholder="Ex: Australian Open"
             value="{{ prefill.tournament if prefill else 'Australian Open' }}">
    </div>
    <div class="form-group">
      <label class="form-label">Surface</label>
      <select class="form-select" name="surface">
        {% for s in surfaces %}
          <option value="{{ s }}" {% if prefill and prefill.surface == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Tour</label>
      <select class="form-select" name="round">
        {% for r in rounds %}
          <option value="{{ r }}" {% if prefill and prefill.round == r %}selected{% endif %}>{{ r }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="grid-3" style="margin-bottom:16px">
    <div class="form-group">
      <label class="form-label">Best of</label>
      <select class="form-select" name="best_of">
        <option value="3" {% if not prefill or prefill.best_of == 3 %}selected{% endif %}>3 sets</option>
        <option value="5" {% if prefill and prefill.best_of == 5 %}selected{% endif %}>5 sets</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Cote Joueur 1 (optionnel)</label>
      <input class="form-input" name="odd_p1" type="number" step="0.01" min="1.01"
             placeholder="Ex: 1.75"
             value="{{ prefill.odd_p1 if prefill and prefill.odd_p1 else '' }}"
             hx-post="/predictions/run"
             hx-target="#result-card"
             hx-swap="innerHTML"
             hx-include="closest form"
             hx-trigger="change">
    </div>
    <div class="form-group">
      <label class="form-label">Cote Joueur 2 (optionnel)</label>
      <input class="form-input" name="odd_p2" type="number" step="0.01" min="1.01"
             placeholder="Ex: 2.10"
             value="{{ prefill.odd_p2 if prefill and prefill.odd_p2 else '' }}"
             hx-post="/predictions/run"
             hx-target="#result-card"
             hx-swap="innerHTML"
             hx-include="closest form"
             hx-trigger="change">
    </div>
  </div>

  <button type="submit" class="btn btn-primary" style="width:100%">&#9889; Analyser</button>
</form>

<div id="result-card" style="margin-top:16px"></div>

<script>
function selectPlayer(name, fieldName, inputId, listId) {
  var input = document.getElementById(inputId);
  input.setAttribute('name', fieldName);
  input.value = name;
  var list = document.getElementById(listId);
  if (list) list.textContent = '';
}

// Auto-run prediction if pre-filled from match card
{% if auto_run %}
document.addEventListener('DOMContentLoaded', function() {
  var p1 = document.getElementById('p1_input');
  var p2 = document.getElementById('p2_input');
  if (p1) p1.setAttribute('name', 'p1_name');
  if (p2) p2.setAttribute('name', 'p2_name');
  setTimeout(function() {
    var btn = document.querySelector('button[type="submit"]');
    if (btn) btn.click();
  }, 50);
});
{% endif %}

// Ensure p1/p2 input names are correct before form submission
document.addEventListener('htmx:configRequest', function(e) {
  var elt = e.detail.elt;
  if (!elt) return;
  // Only run for the prediction form (has hx-post="/predictions/run")
  var form = (elt.tagName === 'FORM') ? elt : (elt.closest ? elt.closest('form[hx-post="/predictions/run"]') : null);
  if (!form) return;
  var p1 = document.getElementById('p1_input');
  var p2 = document.getElementById('p2_input');
  if (p1) p1.setAttribute('name', 'p1_name');
  if (p2) p2.setAttribute('name', 'p2_name');
});
</script>
{% endblock %}
